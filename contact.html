<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact</title>
    <link rel="stylesheet" href="style.css">
    <style>
        /* Styles spécifiques pour rendre le formulaire plus convivial */
        .contact-wrapper {
            background: linear-gradient(135deg, #f1f4f9 0%, #dcf0fb 100%);
            padding: 60px 20px;
            min-height: calc(100vh - 160px);
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .contact-card {
            background: white;
            max-width: 650px;
            width: 100%;
            padding: 40px;
            border-radius: 20px;
            box-shadow: 0 15px 35px rgba(0,0,0,0.1);
        }

        .contact-header {
            text-align: center;
            margin-bottom: 35px;
        }

        .contact-header h1 {
            color: #1565c0;
            font-size: 2.2rem;
            margin-bottom: 10px;
        }

        .contact-header p {
            color: #666;
            font-size: 1.1rem;
        }

        /* Design des champs de saisie */
        .form-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-bottom: 20px;
        }

        @media (max-width: 600px) {
            .form-row { grid-template-columns: 1fr; }
        }

        .form-group {
            margin-bottom: 25px;
            position: relative;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #444;
            font-size: 0.95rem;
        }

        .form-group input, 
        .form-group textarea {
            width: 100%;
            padding: 15px;
            border: 2px solid #edf2f7;
            border-radius: 12px;
            font-size: 1rem;
            transition: all 0.3s ease;
            background-color: #f8fafc;
        }

        .form-group input:focus, 
        .form-group textarea:focus {
            outline: none;
            border-color: #42a5f5;
            background-color: white;
            box-shadow: 0 0 0 4px rgba(66, 165, 245, 0.1);
        }

        .form-group textarea {
            height: 120px;
            resize: vertical;
        }

        .required-tag {
            font-size: 0.8rem;
            color: #e53935;
            font-weight: normal;
            margin-left: 4px;
        }

        /* Bouton d'envoi stylisé */
        .submit-btn {
            background: linear-gradient(135deg, #42a5f5, #1565c0);
            color: white;
            width: 100%;
            padding: 16px;
            border: none;
            border-radius: 12px;
            font-size: 1.1rem;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            box-shadow: 0 10px 20px rgba(21, 101, 192, 0.2);
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 12px 25px rgba(21, 101, 192, 0.3);
        }

        .submit-btn:active {
            transform: translateY(0);
        }
    </style>
</head>
<body>

<header>
    <nav>
        <div class="logo-container">
            <a href="index.html" class="logo-link">
                <img src="logo.png" alt="Logo AlertMarc" class="logo-img">
                <span class="logo">VEILLE SENIOR</span>
            </a>
        </div>

        <div class="menu-toggle" id="mobile-menu">
            <span class="bar"></span>
            <span class="bar"></span>
            <span class="bar"></span>
        </div>

        <ul class="nav-links">
            <li><a href="index.html">Accueil</a></li>
            
            <li><a href="index.html#preview">Aperçu</a></li>
            <li><a href="delete-data.html">Suppression des données</a></li>
            <li><a href="contact.html">Contact</a></li>
            <li><a href="privacy.html">Légal</a></li>
        </ul>
    </nav>
</header>

<main class="contact-wrapper">
    <div class="contact-card">
        <div class="contact-header">
            <h1>Dites-nous tout !</h1>
            <p>Besoin d'aide ou d'un renseignement ? Nous sommes là pour vous.</p>
        </div>

        <form action="https://formsubmit.co/eco.marc@hotmail.fr" method="POST">
            <input type="hidden" name="_subject" value="Nouveau message - Site Web AlertMarc">
            
            <div class="form-row">
                <div class="form-group">
                    <label for="prenom">Prénom</label>
                    <input type="text" name="prenom" id="prenom" placeholder="Ex: Jean">
                </div>
                <div class="form-group">
                    <label for="nom">Nom</label>
                    <input type="text" name="nom" id="nom" placeholder="Ex: Dupont">
                </div>
            </div>

            <div class="form-row">
                <div class="form-group">
                    <label for="email">E-mail</label>
                    <input type="email" name="email" id="email" placeholder="votre@email.com">
                </div>
                <div class="form-group">
                    <label for="tel">Téléphone</label>
                    <input type="tel" name="telephone" id="tel" placeholder="06 .. .. .. ..">
                </div>
            </div>

            <div class="form-group">
                <label for="message">Votre message<span class="required-tag">(Obligatoire)</span></label>
                <textarea name="message" id="message" required placeholder="Comment pouvons-nous vous aider ?"></textarea>
            </div>

            <button type="submit" class="submit-btn">Envoyer mon message</button>
        </form>
    </div>
</main>

<footer>
    <p>&copy; 2026 VEILLE SENIOR. Tous droits réservés.</p>

    <div class="footer-links">
        <a href="privacy.html">Mentions Légales & Confidentialité</a>
        <a href="delete-data.html">Suppression des données</a>
        <a href="contact.html">Aide & Support</a>
    </div>
</footer>

<script src="script.js"></script>

</body>
</html>
